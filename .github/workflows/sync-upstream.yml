name: Sync fork with upstream

on:
  schedule:
    - cron: "0 0 * * *" # 毎日 00:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/babalae/better-genshin-impact.git
          git fetch upstream main
          git fetch origin main upstream-main

      - name: Update upstream-main
        run: |
          git checkout -B upstream-main upstream/main
          git push origin upstream-main --force-with-lease

      - name: Merge into main
        run: |
          git checkout main
          git merge --no-edit upstream-main
          git push origin main